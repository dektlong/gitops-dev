apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-mood
  annotations:
    kapp.k14s.io/update-strategy: fallback-on-replace
    ootb.apps.tanzu.vmware.com/servicebinding-workload: "true"
  labels:
    app.kubernetes.io/part-of: legacy-mood
    apps.tanzu.vmware.com/workload-type: dekt-worker
    app.kubernetes.io/component: run
    carto.run/workload-name: legacy-mood
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: run
      app.kubernetes.io/part-of: legacy-mood
      apps.tanzu.vmware.com/workload-type: dekt-worker
      carto.run/workload-name: legacy-mood
  template:
    metadata:
      annotations:
        conventions.carto.run/applied-conventions: appliveview-sample/app-live-view-appflavour-check
        developer.conventions/target-containers: workload
      labels:
        app.kubernetes.io/component: run
        app.kubernetes.io/part-of: legacy-mood
        apps.tanzu.vmware.com/workload-type: dekt-worker
        carto.run/workload-name: legacy-mood
    spec:
      containers:
      - image: harbor.registry.dekt.io/dekt-dev/legacy-mood-myteam@sha256:c2ea055c8e288d98988475e7b5fc74ae54db0831ffd58d653ce7e8dc8e8d9969
        name: workload
        resources: {}
        securityContext:
          runAsUser: 1000
      serviceAccountName: default

